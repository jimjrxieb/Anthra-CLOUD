# Anthra Cloud Ingress — ALB with TLS termination
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: anthra-ingress
  namespace: anthra
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "${ACM_CERTIFICATE_ARN}"
    alb.ingress.kubernetes.io/security-groups: "${ALB_SECURITY_GROUP}"
    alb.ingress.kubernetes.io/healthcheck-path: /api/health
    alb.ingress.kubernetes.io/wafv2-acl-arn: "${WAF_ACL_ARN}"
spec:
  tls:
    - hosts:
        - anthra.cloud
        - "*.anthra.cloud"
  rules:
    - host: anthra.cloud
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: anthra-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: anthra-ui
                port:
                  number: 8080
    - host: ingest.anthra.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: anthra-log-ingest
                port:
                  number: 9090
