# K8s Secret — placeholder values, replaced by ExternalSecrets in production
# In production: ExternalSecrets Operator syncs from AWS Secrets Manager
# WARNING: Do not commit real credentials. These are dev-only placeholders.
apiVersion: v1
kind: Secret
metadata:
  name: anthra-db-credentials
  namespace: anthra
  labels:
    owner: anthra-team
    cost-center: anthra-saas
    data-classification: restricted
  annotations:
    secret.ghostprotocol.io/rotation-date: "2026-06-30"
    secret.ghostprotocol.io/managed-by: "external-secrets-operator"
    secret.ghostprotocol.io/backend: "aws-secrets-manager"
type: Opaque
stringData:
  username: anthra_admin
  password: "REPLACE_WITH_SECRETS_MANAGER_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: anthra-api-keys
  namespace: anthra
  labels:
    owner: anthra-team
    cost-center: anthra-saas
    data-classification: restricted
  annotations:
    secret.ghostprotocol.io/rotation-date: "2026-06-30"
    secret.ghostprotocol.io/managed-by: "external-secrets-operator"
    secret.ghostprotocol.io/backend: "aws-secrets-manager"
type: Opaque
stringData:
  jwt-secret: "REPLACE_WITH_SECRETS_MANAGER_VALUE"
  api-key: "REPLACE_WITH_SECRETS_MANAGER_VALUE"
