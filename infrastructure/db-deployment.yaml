apiVersion: apps/v1
kind: Deployment
metadata:
  name: anthra-db
  namespace: anthra
  labels:
    app: anthra-db
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anthra-db
  template:
    metadata:
      labels:
        app: anthra-db
        component: database
    spec:
      serviceAccountName: anthra-db
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:15.4-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: anthra
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: anthra-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: anthra-db-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "anthra"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "anthra"]
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: anthra-db-pvc
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: run
          emptyDir:
            sizeLimit: 8Mi
