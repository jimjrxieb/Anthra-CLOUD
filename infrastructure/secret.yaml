# K8s Secret — placeholder values, replaced by ExternalSecrets in production
# In production: ExternalSecrets Operator syncs from AWS Secrets Manager
apiVersion: v1
kind: Secret
metadata:
  name: anthra-db-credentials
  namespace: anthra
type: Opaque
stringData:
  username: anthra_admin
  password: "REPLACE_WITH_SECRETS_MANAGER_VALUE"
---
apiVersion: v1
kind: Secret
metadata:
  name: anthra-api-keys
  namespace: anthra
type: Opaque
stringData:
  jwt-secret: "REPLACE_WITH_SECRETS_MANAGER_VALUE"
  api-key: "REPLACE_WITH_SECRETS_MANAGER_VALUE"
