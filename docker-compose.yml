# Anthra Security Platform — Local Development Stack
#
# Quick start: docker compose up -d
#
# Services:
# - API:        http://localhost:8080
# - UI:         http://localhost:3000
# - Log Ingest: http://localhost:9090
# - Database:   localhost:5432

services:
  db:
    image: postgres:15
    container_name: anthra-db
    environment:
      POSTGRES_DB: anthra
      POSTGRES_USER: anthra
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev-only-change-me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anthra"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api:
    build: ./api
    container_name: anthra-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: anthra
      DB_USER: anthra
      DB_PASSWORD: ${DB_PASSWORD:-localdev-only-change-me}
      JWT_SECRET: ${JWT_SECRET:-localdev-ephemeral-key-do-not-use-in-prod}
      ALLOWED_ORIGINS: "http://localhost:3000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  ui:
    build: ./ui
    container_name: anthra-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  log-ingest:
    build: ./services
    container_name: anthra-log-ingest
    ports:
      - "9090:9090"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: anthra
      DB_USER: anthra
      DB_PASSWORD: ${DB_PASSWORD:-localdev-only-change-me}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  pgdata:
    name: anthra_pgdata
