apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: anthra-require-resource-limits
  annotations:
    policies.kyverno.io/title: Require Resource Limits
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Resource limits prevent a single container from consuming all node resources.
      FedRAMP Moderate SC-5 requires denial-of-service protection.
    gp-copilot/standard: "CIS-5.4.1, NIST SC-5"
    gp-copilot/fedramp: "moderate"
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - anthra
      validate:
        message: "CPU and memory limits/requests are required for all containers."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    memory: "?*"
                    cpu: "?*"
                  requests:
                    memory: "?*"
                    cpu: "?*"
