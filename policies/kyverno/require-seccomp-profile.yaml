apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: anthra-require-seccomp-profile
  annotations:
    policies.kyverno.io/title: Require Seccomp Profile
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Seccomp profiles restrict the set of system calls a container can make.
      FedRAMP Moderate SC-7 requires boundary protection.
    gp-copilot/standard: "CIS-5.7.2, NIST SC-7"
    gp-copilot/fedramp: "moderate"
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-seccomp
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - anthra
      validate:
        message: "Seccomp profile must be set to RuntimeDefault or Localhost."
        anyPattern:
          - spec:
              securityContext:
                seccompProfile:
                  type: RuntimeDefault
          - spec:
              securityContext:
                seccompProfile:
                  type: Localhost
