apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: anthra-require-readonly-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      A read-only root filesystem prevents attackers from writing malicious binaries
      or modifying system files. FedRAMP Moderate SI-7 requires software integrity.
    gp-copilot/standard: "CIS-5.2.8, NIST SI-7"
    gp-copilot/fedramp: "moderate"
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-readonly-rootfs
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - anthra
      validate:
        message: "Root filesystem must be read-only. Set readOnlyRootFilesystem: true."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
