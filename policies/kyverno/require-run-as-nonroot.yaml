apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: anthra-require-run-as-nonroot
  annotations:
    policies.kyverno.io/title: Require Run As Non-Root
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Running as root allows full host access if a container escape occurs.
      FedRAMP Moderate CM-6 requires secure configuration baselines.
    gp-copilot/standard: "CIS-5.2.6, NIST CM-6"
    gp-copilot/fedramp: "moderate"
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - anthra
      validate:
        message: "Containers must run as non-root. Set runAsNonRoot: true."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            containers:
              - securityContext:
                  runAsNonRoot: true
