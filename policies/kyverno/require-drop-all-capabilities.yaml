apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: anthra-require-drop-all-capabilities
  annotations:
    policies.kyverno.io/title: Require Drop All Capabilities
    policies.kyverno.io/category: Pod Security Standards (Restricted)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Linux capabilities grant specific privileges. Dropping ALL and only adding
      what is needed follows least privilege. FedRAMP Moderate AC-6.
    gp-copilot/standard: "CIS-5.2.9, NIST AC-6"
    gp-copilot/fedramp: "moderate"
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-drop-all
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - anthra
      validate:
        message: "Containers must drop ALL capabilities."
        foreach:
          - list: "request.object.spec.containers[]"
            deny:
              conditions:
                all:
                  - key: "ALL"
                    operator: AnyNotIn
                    value: "{{ element.securityContext.capabilities.drop || `[]` }}"
