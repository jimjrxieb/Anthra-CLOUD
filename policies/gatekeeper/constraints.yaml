# ============================================================================
# OPA GATEKEEPER CONSTRAINTS — Anthra-CLOUD (FedRAMP Moderate)
# ============================================================================
# Constraint instances scoped to the anthra namespace.
# System namespaces and ArgoCD are excluded to prevent sync loops.
#
# CRITICAL: ArgoCD namespace is excluded from all constraints.
# Gatekeeper mutations on ArgoCD-managed resources cause infinite sync loops.
# Fix misconfigs in git, not via admission. See argocd-rules.md.
#
# Deploy AFTER constraint-templates.yaml CRDs are registered.
# Enforcement: deny (deploy-policies.sh converts to dryrun in audit mode)
# ============================================================================

---
# Constraint: Require Non-Root Containers
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sRequireNonRoot
metadata:
  name: anthra-require-non-root
  annotations:
    nist-800-53: "AC-6(10)"
    fedramp: "moderate"
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: ["apps"]
        kinds: ["Deployment", "StatefulSet", "DaemonSet"]
    namespaces:
      - anthra
    excludedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - gatekeeper-system
      - argocd

---
