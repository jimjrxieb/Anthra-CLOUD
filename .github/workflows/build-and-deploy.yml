name: Build, Push, Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'services/**'
      - 'ui/**'
      - 'infrastructure/**'
      - 'policies/**'
  workflow_dispatch:

permissions:
  contents: write       # Push image tag updates back to repo
  packages: write       # Push to GHCR
  id-token: write       # OIDC → AWS temporary credentials

env:
  GHCR_REGISTRY: ghcr.io
  ECR_REGISTRY: 026090554981.dkr.ecr.us-east-1.amazonaws.com
  OWNER: jimjrxieb
  AWS_REGION: us-east-1
  CONFTEST_VERSION: "0.56.0"

jobs:
  # ─── OPA Policy Gate — blocks builds if manifests violate policies ─
  policy-gate:
    name: "CM-6: Conftest Policy Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/

      - name: Validate K8s manifests against OPA policies
        run: |
          echo "=== Testing base manifests ==="
          conftest test \
            infrastructure/anthra-api/base/*.yaml \
            infrastructure/anthra-ui/base/*.yaml \
            infrastructure/anthra-log-ingest/base/*.yaml \
            infrastructure/anthra-db/base/*.yaml \
            infrastructure/*.yaml \
            --policy policies/conftest \
            --all-namespaces \
            --output stdout

      - name: Validate overlay manifests
        run: |
          for env in dev staging; do
            for svc in anthra-api anthra-ui anthra-log-ingest anthra-db; do
              OVERLAY="infrastructure/${svc}/overlays/${env}"
              if [ -d "$OVERLAY" ] && ls "$OVERLAY"/*.yaml &>/dev/null; then
                echo "=== Testing ${svc}/${env} ==="
                conftest test "$OVERLAY"/*.yaml \
                  --policy policies/conftest \
                  --all-namespaces \
                  --output stdout
              fi
            done
          done

  # ─── Detect which services changed ─────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      services: ${{ steps.filter.outputs.services }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
            services:
              - 'services/**'
            ui:
              - 'ui/**'

  # ─── Build & Push images (GHCR + ECR) ──────────────────────────────
  build-api:
    name: Build anthra-api
    needs: [policy-gate, changes]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.OWNER }}/anthra-api:${{ steps.tags.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/anthra-api:${{ steps.tags.outputs.sha_tag }}

  build-services:
    name: Build anthra-log-ingest
    needs: [policy-gate, changes]
    if: needs.changes.outputs.services == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./services
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.OWNER }}/anthra-log-ingest:${{ steps.tags.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/anthra-log-ingest:${{ steps.tags.outputs.sha_tag }}

  build-ui:
    name: Build anthra-ui
    needs: [policy-gate, changes]
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./ui
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.OWNER }}/anthra-ui:${{ steps.tags.outputs.sha_tag }}
            ${{ env.ECR_REGISTRY }}/anthra-ui:${{ steps.tags.outputs.sha_tag }}

  # ─── Update Kustomize image tags (auto-deploy to dev) ──────────────
  #     Points to ECR since that's where EKS pulls from
  update-manifests:
    name: Update image tags → dev
    needs: [build-api, build-services, build-ui]
    if: always() && (needs.build-api.result == 'success' || needs.build-services.result == 'success' || needs.build-ui.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Kustomize image tags for dev
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [ "${{ needs.build-api.result }}" = "success" ]; then
            echo "Updating anthra-api → sha-${SHORT_SHA}"
            cd infrastructure/anthra-api/overlays/dev
            kustomize edit set image anthra/api=${{ env.ECR_REGISTRY }}/anthra-api:sha-${SHORT_SHA}
            cd ../../../..
          fi

          if [ "${{ needs.build-services.result }}" = "success" ]; then
            echo "Updating anthra-log-ingest → sha-${SHORT_SHA}"
            cd infrastructure/anthra-log-ingest/overlays/dev
            kustomize edit set image anthra/log-ingest=${{ env.ECR_REGISTRY }}/anthra-log-ingest:sha-${SHORT_SHA}
            cd ../../../..
          fi

          if [ "${{ needs.build-ui.result }}" = "success" ]; then
            echo "Updating anthra-ui → sha-${SHORT_SHA}"
            cd infrastructure/anthra-ui/overlays/dev
            kustomize edit set image anthra/ui=${{ env.ECR_REGISTRY }}/anthra-ui:sha-${SHORT_SHA}
            cd ../../../..
          fi

      - name: Commit and push tag updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "ci: update image tags to sha-${GITHUB_SHA::7} [skip ci]"
            git push
          fi

  # ─── Promote to staging (manual trigger) ───────────────────────────
  promote-staging:
    name: Promote dev → staging
    needs: update-manifests
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    environment: staging  # Requires approval in GitHub Settings → Environments
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy image tags from dev to staging
        run: |
          for service in anthra-api anthra-log-ingest anthra-ui; do
            DEV_KUST="infrastructure/${service}/overlays/dev/kustomization.yaml"
            STAGING_KUST="infrastructure/${service}/overlays/staging/kustomization.yaml"

            if grep -q "images:" "$DEV_KUST" 2>/dev/null; then
              python3 -c "
          import yaml
          with open('$DEV_KUST') as f:
              dev = yaml.safe_load(f)
          with open('$STAGING_KUST') as f:
              staging = yaml.safe_load(f)
          if 'images' in dev:
              staging['images'] = dev['images']
              with open('$STAGING_KUST', 'w') as f:
                  yaml.dump(staging, f, default_flow_style=False)
              print(f'  {service}: promoted to staging')
          "
            fi
          done

      - name: Commit staging promotion
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/
          if git diff --cached --quiet; then
            echo "No changes to promote"
          else
            git commit -m "ci: promote to staging — sha-${GITHUB_SHA::7} [skip ci]"
            git push
          fi
