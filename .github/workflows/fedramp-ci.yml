name: FedRAMP Moderate CI — Anthra Cloud

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'services/**'
      - 'ui/**'
      - 'infrastructure/**'
      - 'policies/**'
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

env:
  TRIVY_VERSION: "0.58.0"
  CONFTEST_VERSION: "0.56.0"

jobs:
  trivy-scan:
    name: "RA-5/SI-2: Vulnerability Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.31.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 1

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 365

  semgrep-scan:
    name: "SA-11: SAST Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

  gitleaks-scan:
    name: "IA-5: Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  conftest-policies:
    name: "CM-6: OPA Policy Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conftest
        run: |
          wget -q "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          tar xzf "conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          sudo mv conftest /usr/local/bin/

      - name: Validate K8s manifests against local OPA policies
        run: |
          conftest test \
            infrastructure/gitops/anthra-api/base/*.yaml \
            infrastructure/gitops/anthra-ui/base/*.yaml \
            infrastructure/gitops/anthra-log-ingest/base/*.yaml \
            infrastructure/gitops/anthra-db/base/*.yaml \
            infrastructure/k8s/*.yaml \
            --policy policies/conftest \
            --all-namespaces \
            --output stdout

  checkov-scan:
    name: "CM-6: IaC Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,cloudformation,kubernetes,dockerfile
          soft_fail: true
          output_format: json
          output_file_path: checkov-results.json

      - name: Upload Checkov results
        uses: actions/upload-artifact@v4
        with:
          name: checkov-results
          path: checkov-results.json
          retention-days: 365
